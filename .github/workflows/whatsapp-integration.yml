name: WhatsApp integration tests

on:
  push:
    branches: [main, master]
    paths:
      - 'GuideXpert-Backend/**'
      - '.github/workflows/whatsapp-integration.yml'
  pull_request:
    paths:
      - 'GuideXpert-Backend/**'
      - '.github/workflows/whatsapp-integration.yml'
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GuideXpert-Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: GuideXpert-Backend/package-lock.json
      - run: npm ci
      - run: npm run test:whatsapp-reminder-hardening
      - run: npm run test:whatsapp-retry-rules
      - run: npm run test:gupshup-webhook
      - run: node --test test/whatsappOps*.test.js test/waAnalyticsIntegrity.test.js

  integration:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GuideXpert-Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: GuideXpert-Backend/package-lock.json
      - run: npm ci
      - run: npm run test:integration

  integration-race:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GuideXpert-Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: GuideXpert-Backend/package-lock.json
      - run: npm ci
      - run: npm run test:integration:race

  stress:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GuideXpert-Backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: GuideXpert-Backend/package-lock.json
      - run: npm ci
      - run: npm run test:integration:stress
        env:
          WA_STRESS_JOB_COUNT: '500'
